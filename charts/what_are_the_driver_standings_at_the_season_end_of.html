etails."}, {"indent": 29, "raw": "\u2502                           \u2502\u2502           0.00s           \u2502", "label": "\u2502                           \u2502\u2502           0.00s           \u2502", "timing": "", "rows": "", "explanation": "DuckDB internal operator. See https://duckdb.org/docs/internals/ for details."}, {"indent": 29, "raw": "\u2502      Dynamic Filters:     \u2502\u2502                           \u2502", "label": "Filter (Predicate Pushdown)", "timing": "", "rows": "", "explanation": "Applies WHERE conditions as early as possible to eliminate rows before they reach expensive operators. This is DuckDB's predicate pushdown \u2014 a core OLAP optimisation that avoids reading unnecessary data."}, {"indent": 29, "raw": "\u2502 optional: raceId>=1145 AND\u2502\u2502                           \u2502", "label": "\u2502 optional: raceId>=1145 AND\u2502\u2502                           \u2502", "timing": "", "rows": "", "explanation": "DuckDB internal operator. See https://duckdb.org/docs/internals/ for details."}, {"indent": 29, "raw": "\u2502   optional: raceId<=1168  \u2502\u2502                           \u2502", "label": "\u2502   optional: raceId<=1168  \u2502\u2502                           \u2502", "timing": "", "rows": "", "explanation": "DuckDB internal operator. See https://duckdb.org/docs/internals/ for details."}, {"indent": 29, "raw": "\u2502          498 rows         \u2502\u2502          24 rows          \u2502", "label": "\u2502          498 rows         \u2502\u2502          24 rows          \u2502", "timing": "", "rows": "", "explanation": "DuckDB internal operator. See https://duckdb.org/docs/internals/ for details."}, {"indent": 29, "raw": "\u2502           0.00s           \u2502\u2502          (0.00s)          \u2502", "label": "\u2502           0.00s           \u2502\u2502", "timing": "", "rows": "", "explanation": "DuckDB internal operator. See https://duckdb.org/docs/internals/ for details."}];
const SQL    = "SELECT T1.forename, T1.surname, T2.points \nFROM drivers AS T1 \nJOIN driver_standings AS T2 ON T1.driverId = T2.driverId \nJOIN races AS T3 ON T2.raceId = T3.raceId \nWHERE T3.year = 2025 \nORDER BY T2.points DESC \nLIMIT 500";

const BASE_LAYOUT = {
  margin:{t:40,b:60,l:70,r:40},
  paper_bgcolor:"#ffffff", plot_bgcolor:"#f9f9f9",
  font:{family:"Arial",size:13},
  xaxis:{showgrid:true,gridcolor:"#eeeeee",zeroline:false},
  yaxis:{showgrid:true,gridcolor:"#eeeeee",zeroline:false},
};

let current     = "bar";
let explainOpen = false;

// ── Chart switcher ────────────────────────────────────────────────────────────
function show(type) {
  if (!CHARTS[type]) return;
  current = type;
  document.querySelectorAll(".btn:not(.btn-explain)").forEach(b =>
    b.classList.toggle("active", b.dataset.type === type)
  );
  const fig    = CHARTS[type];
  const layout = Object.assign({}, BASE_LAYOUT, fig.layout || {});
  Plotly.react("chart-area", fig.data, layout, {responsive:true});
}

// ── Explain panel ─────────────────────────────────────────────────────────────
function toggleExplain() {
  explainOpen = !explainOpen;
  const panel = document.getElementById("explain-panel");
  const btn   = document.getElementById("btnExplain");
  panel.classList.toggle("open", explainOpen);
  btn.classList.toggle("active", explainOpen);

  if (explainOpen && !document.getElementById("explainBody").hasChildNodes()) {
    renderPlan();
  }
  // Resize chart after panel animation
  setTimeout(() => Plotly.Plots.resize("chart-area"), 320);
}

// ── Render execution plan ─────────────────────────────────────────────────────
const TAG_MAP = {
  "Scan":       "tag-scan",
  "Join":       "tag-join",
  "Aggregate":  "tag-agg",
  "Sort":       "tag-sort",
  "Order":      "tag-sort",
  "Filter":     "tag-filter",
  "Projection": "tag-proj",
  "Collector":  "tag-proj",
};

function nodeTag(label) {
  for (const [k, cls] of Object.entries(TAG_MAP)) {
    if (label.includes(k)) {
      return `<span class="tag ${cls}">${k}</span>`;
    }
  }
  return "";
}

function renderPlan() {
  const body = document.getElementById("explainBody");
  body.innerHTML = "";

  // SQL block
  const sqlDiv = document.createElement("div");
  sqlDiv.className = "sql-block";
  sqlDiv.textContent = SQL;
  body.appendChild(sqlDiv);

  // Plan nodes
  if (!PLAN || PLAN.length === 0) {
    body.innerHTML += "<p style='color:#666;font-size:12px;padding:8px'>No plan available.</p>";
    return;
  }

  PLAN.forEach((node, i) => {
    const div  = document.createElement("div");
    div.className = "plan-node";
    div.style.marginLeft = Math.min(node.indent * 1.5, 40) + "px";

    const meta = [
      node.timing ? "⏱ " + node.timing : "",
      node.rows   ? "↓ " + node.rows + " rows" : "",
    ].filter(Boolean).join("  ");

    div.innerHTML = `
      <div class="node-top">
        <span class="node-label">${nodeTag(node.label)}${node.label}</span>
        <span class="node-meta">${meta}</span>
      </div>
      <div class="node-raw">${node.raw}</div>
      <div class="node-explain">${node.explanation}</div>
    `;
    div.addEventListener("click", () => div.classList.toggle("expanded"));
    body.appendChild(div);
  });
}

// Initial render
show(current);
</script>
